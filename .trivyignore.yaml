# Trivy ignore file — YAML format.
# Known vulnerabilities tracked in SECURITY.md.
# Review each entry before the expiry date.

vulnerabilities:
  # zlib1g: integer overflow in minizip (Debian Bookworm, no fix available).
  # minizip is not used by mdless or Node.js at runtime.
  - id: CVE-2023-45853
    statement: "minizip code path not reachable; mdless does not perform zip archive operations"
    expired_at: "2026-06-17T00:00:00Z"

  # glibc: memalign integer overflow (Debian Bookworm, no fix available).
  # Requires attacker-controlled allocation size, not reachable via mdless.
  - id: CVE-2026-0861
    statement: "memalign path not reachable; mdless does not perform custom memory allocation"
    expired_at: "2026-06-17T00:00:00Z"

  # zlib1g: CRC32 DoS infinite loop (Debian Bookworm, no fix available).
  # Low risk for markdown-only processing workloads.
  - id: CVE-2026-27171
    statement: "CRC32 DoS not exploitable in markdown parsing context"
    expired_at: "2026-06-17T00:00:00Z"

  # minimatch: regular expression denial of service (ReDoS) in glob matching.
  # mdless does not process user-controlled glob patterns at runtime.
  - id: CVE-2026-26996
    statement: "minimatch ReDoS not reachable; mdless does not expose glob patterns to user input"
    expired_at: "2026-12-31T00:00:00Z"

  # systemd: arbitrary code execution via spurious IPC (Debian Bookworm, no fix available).
  # systemd is not invoked by mdless or Node.js at runtime in the container.
  - id: CVE-2026-29111
    statement: "systemd IPC code path not reachable; mdless container does not invoke systemd"
    expired_at: "2026-12-31T00:00:00Z"

  # ncurses: buffer overflow in ncurses (Debian Bookworm, no fix available).
  # ncurses is not used by mdless or Node.js; terminal output goes to stdout.
  - id: CVE-2025-69720
    statement: "ncurses code path not reachable; mdless outputs plain text to stdout without ncurses"
    expired_at: "2026-12-31T00:00:00Z"
