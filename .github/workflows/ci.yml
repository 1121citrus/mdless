name: CI
on:
  push:
    branches: [main, master, staging]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs for branch/PR refs; let tag builds always complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: "."
          severity: warning

      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml

      - name: Node.js syntax check
        run: node --check docker-entrypoint.mjs

      - name: Lint markdown with markdownlint-cli
        run: |
          docker run --rm \
            -v "$PWD:/workdir:ro" \
            -w /workdir \
            ghcr.io/igorshubovych/markdownlint-cli:v0.48.0 \
            "**/*.md"

  # ── Build & test ─────────────────────────────────────────────────────────────
  build-test:
    name: Build & test
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run integration test suite
        # test/run-tests builds the image (tag: test) then runs all checks.
        run: sh test/run-tests

  # ── Security scan ─────────────────────────────────────────────────────────────
  # Filesystem scan — results uploaded to GitHub Security tab.
  # Non-blocking: findings are visible but do not prevent publication.
  scan:
    name: Security scan
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN
          trivyignores: .trivyignore.yaml

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif

  # ── Build & push ─────────────────────────────────────────────────────────────
  # Triggered only by version tags (v1.2.3, v1.2, v1).
  # v1.2.3 → 1121citrus/mdless:1.2.3, :1.2, :1, :latest
  push:
    name: Build & push
    needs: build-test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Multi-arch: arm64 emulation via QEMU.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Derive image tags and OCI labels from the git tag.
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: 1121citrus/mdless
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build multi-arch image and push with provenance + SBOM attestations.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
