name: Publish

# Triggered by version tags: v1.2.3, v1.2, v1
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Build & push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      # Multi-arch: arm64 emulation via QEMU.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Derive image tags and OCI labels from the git tag.
      # v1.2.3 → 1121citrus/mdless:1.2.3, :1.2, :1, :latest
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: 1121citrus/mdless
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build multi-arch image and push with provenance + SBOM attestations.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
